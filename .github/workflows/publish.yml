name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'NPM tag (latest, next, beta, etc.)'
        required: false
        default: 'latest'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: dist directory not found"
            exit 1
          fi
          if [ ! -f "dist/index.js" ]; then
            echo "Error: dist/index.js not found"
            exit 1
          fi
          echo "Build output verified successfully"

      - name: Determine NPM tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "npm_tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            if [[ "$TAG_NAME" =~ -beta\. ]]; then
              echo "npm_tag=beta" >> $GITHUB_OUTPUT
            elif [[ "$TAG_NAME" =~ -alpha\. ]]; then
              echo "npm_tag=alpha" >> $GITHUB_OUTPUT
            elif [[ "$TAG_NAME" =~ -next\. ]]; then
              echo "npm_tag=next" >> $GITHUB_OUTPUT
            elif [[ "$TAG_NAME" =~ -rc\. ]]; then
              echo "npm_tag=rc" >> $GITHUB_OUTPUT
            else
              echo "npm_tag=latest" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Publish to npm
        run: npm publish --tag ${{ steps.tag.outputs.npm_tag }} --provenance
